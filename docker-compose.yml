# Pharos – Docker Compose
#
# ── Quick start (test mode, no credentials needed) ───────────────────────────
#   docker compose up --build
#   open http://localhost:8501
#
# ── Production / real cluster ────────────────────────────────────────────────
#   cp .env.example .env          # fill in real OCP OAuth + OCP API values
#   docker compose up --build
#
# Both services use the same image; the command selects which process to run.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: pharos-frontend:local
    container_name: pharos-frontend
    command:
      - streamlit
      - run
      - app.py
      - "--server.port=8501"
      - "--server.address=0.0.0.0"
      - "--server.headless=true"
      - "--server.enableCORS=false"
      - "--server.enableXsrfProtection=true"
    ports:
      - "8501:8501"
    env_file:
      - .env.test               # safe committed defaults
      - path: .env              # local production overrides (optional)
        required: false
    environment:
      - EXPORTER_URL=http://exporter:8080
    volumes:
      # Mount source for hot-reload during development.
      # Remove this volume block for a clean production-like image test.
      - type: bind
        source: .
        target: /app
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    depends_on:
      - exporter
    restart: unless-stopped

  exporter:
    image: pharos-frontend:local
    container_name: pharos-exporter
    command:
      - uvicorn
      - exporter.main:app
      - "--host=0.0.0.0"
      - "--port=8080"
    ports:
      - "8080:8080"
    env_file:
      - .env.test
      - path: .env
        required: false
    environment:
      - K8S_IN_CLUSTER=false
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    restart: unless-stopped
