---
# ServiceAccount used by the pharos-exporter pod to read cluster resources.
# The pharos-frontend (Streamlit) pod itself uses the logged-in user's OAuth
# token and therefore needs no special RBAC.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pharos-exporter
  namespace: pharos-frontend
  labels:
    app.kubernetes.io/name: pharos-exporter

---
# ClusterRole: read-only access to everything the exporter needs to snapshot.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: pharos-exporter
  labels:
    app.kubernetes.io/name: pharos-exporter
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]

  # AdminNetworkPolicy / BaselineAdminNetworkPolicy (OCP 4.14+ / ANP feature gate)
  # The exporter gracefully handles 404/403 if these CRDs are absent.
  - apiGroups: ["policy.networking.k8s.io"]
    resources: ["adminnetworkpolicies", "baselineadminnetworkpolicies"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: pharos-exporter
  labels:
    app.kubernetes.io/name: pharos-exporter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: pharos-exporter
subjects:
  - kind: ServiceAccount
    name: pharos-exporter
    namespace: pharos-frontend
