---
# ServiceAccount used by the netpol-crafter Pod.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: netpol-crafter
  namespace: netpol-crafter
  labels:
    app.kubernetes.io/name: netpol-crafter

---
# ClusterRole: read-only access to the resources the UI needs to populate dropdowns.
# Write access is scoped to NetworkPolicies only.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: netpol-crafter
  labels:
    app.kubernetes.io/name: netpol-crafter
rules:
  # List & read namespaces (to populate the namespace dropdown)
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]

  # Read pods and their labels (to build podSelector)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Read services (to pre-fill selectors from Service definitions)
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]

  # Create / update NetworkPolicies (the primary write action of this tool)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]

  # Read OpenShift Routes (informational – used to display Route context)
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: netpol-crafter
  labels:
    app.kubernetes.io/name: netpol-crafter
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: netpol-crafter
subjects:
  - kind: ServiceAccount
    name: netpol-crafter
    namespace: netpol-crafter
