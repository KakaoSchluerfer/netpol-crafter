---
apiVersion: v1
kind: Namespace
metadata:
  name: netpol-crafter
  labels:
    kubernetes.io/metadata.name: netpol-crafter

---
# ── Non-sensitive configuration ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: netpol-crafter-config
  namespace: netpol-crafter
data:
  OCP_CLIENT_ID: "netpol-crafter"
  OCP_API_SERVER: "https://api.your-cluster.example.com:6443"
  OCP_REDIRECT_URI: "https://netpol-crafter.apps.your-cluster.example.com"
  CLUSTER_NAME: "Production"
  EXPORTER_URL: "http://netpol-exporter:8080"
  K8S_IN_CLUSTER: "true"
  TEST_MODE: "false"
  # Uncomment when using a custom cluster CA (see Secret + volume below):
  # OCP_CA_CERT_PATH: "/etc/netpol-certs/cluster-ca.crt"

---
# ── Cluster CA bundle (optional) ──────────────────────────────────────────────
# Create this Secret from your actual CA file:
#   oc create secret generic netpol-crafter-ca \
#     -n netpol-crafter \
#     --from-file=cluster-ca.crt=/path/to/your/cluster-ca.crt
#
# Then uncomment the volume/volumeMount blocks in the netpol-crafter Deployment
# and set OCP_CA_CERT_PATH in the ConfigMap above.
#
# DO NOT use verify=False — always use the CA bundle for production clusters.
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: netpol-crafter-ca
#   namespace: netpol-crafter
# type: Opaque
# data:
#   cluster-ca.crt: <base64-encoded PEM>

---
# ── Sensitive credentials ─────────────────────────────────────────────────────
# Fill in REPLACE_ME values before applying.
# Use Sealed Secrets, Vault, or an OCP ExternalSecret for production.
apiVersion: v1
kind: Secret
metadata:
  name: netpol-crafter-secrets
  namespace: netpol-crafter
type: Opaque
stringData:
  OCP_CLIENT_SECRET: "REPLACE_ME"
  APP_SECRET_KEY: "REPLACE_ME"  # python3 -c "import secrets; print(secrets.token_urlsafe(64))"

---
# ── netpol-crafter (Streamlit UI) ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netpol-crafter
  namespace: netpol-crafter
  labels:
    app.kubernetes.io/name: netpol-crafter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netpol-crafter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netpol-crafter
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: your-registry.example.com/netpol-crafter:latest
          command:
            - streamlit
            - run
            - app.py
            - "--server.port=8501"
            - "--server.address=0.0.0.0"
            - "--server.headless=true"
            - "--server.enableCORS=false"
            - "--server.enableXsrfProtection=true"
          ports:
            - containerPort: 8501
              name: http
          envFrom:
            - configMapRef:
                name: netpol-crafter-config
            - secretRef:
                name: netpol-crafter-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 30
          # Uncomment to mount the cluster CA bundle (requires netpol-crafter-ca Secret):
          # volumeMounts:
          #   - name: cluster-ca
          #     mountPath: /etc/netpol-certs
          #     readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Streamlit writes temp files
            capabilities:
              drop: ["ALL"]
      # Uncomment when using a custom cluster CA:
      # volumes:
      #   - name: cluster-ca
      #     secret:
      #       secretName: netpol-crafter-ca

---
apiVersion: v1
kind: Service
metadata:
  name: netpol-crafter
  namespace: netpol-crafter
spec:
  selector:
    app.kubernetes.io/name: netpol-crafter
  ports:
    - port: 8501
      targetPort: 8501
      name: http

---
# OpenShift Route — TLS edge termination
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: netpol-crafter
  namespace: netpol-crafter
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  host: netpol-crafter.apps.your-cluster.example.com  # replace
  to:
    kind: Service
    name: netpol-crafter
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

---
# ── netpol-exporter (FastAPI) ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netpol-exporter
  namespace: netpol-crafter
  labels:
    app.kubernetes.io/name: netpol-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netpol-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netpol-exporter
    spec:
      serviceAccountName: netpol-exporter
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: exporter
          image: your-registry.example.com/netpol-crafter:latest
          command:
            - uvicorn
            - exporter.main:app
            - "--host=0.0.0.0"
            - "--port=8080"
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: netpol-crafter-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: cache
              mountPath: /app/cache
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: cache
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: netpol-exporter
  namespace: netpol-crafter
spec:
  selector:
    app.kubernetes.io/name: netpol-exporter
  ports:
    - port: 8080
      targetPort: 8080
      name: http
