---
apiVersion: v1
kind: Namespace
metadata:
  name: pharos-frontend
  labels:
    kubernetes.io/metadata.name: pharos-frontend

---
# ── Non-sensitive configuration ───────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: pharos-frontend-config
  namespace: pharos-frontend
data:
  OCP_CLIENT_ID: "pharos-frontend"
  OCP_API_SERVER: "https://api.your-cluster.example.com:6443"
  OCP_REDIRECT_URI: "https://pharos-frontend.apps.your-cluster.example.com"
  CLUSTER_NAME: "Production"
  EXPORTER_URL: "http://pharos-exporter:8080"
  K8S_IN_CLUSTER: "true"
  TEST_MODE: "false"
  # Uncomment when using a custom cluster CA (see Secret + volume below):
  # OCP_CA_CERT_PATH: "/etc/netpol-certs/cluster-ca.crt"

---
# ── Cluster CA bundle (optional) ──────────────────────────────────────────────
# Create this Secret from your actual CA file:
#   oc create secret generic pharos-frontend-ca \
#     -n pharos-frontend \
#     --from-file=cluster-ca.crt=/path/to/your/cluster-ca.crt
#
# Then uncomment the volume/volumeMount blocks in the pharos-frontend Deployment
# and set OCP_CA_CERT_PATH in the ConfigMap above.
#
# DO NOT use verify=False — always use the CA bundle for production clusters.
#
# apiVersion: v1
# kind: Secret
# metadata:
#   name: pharos-frontend-ca
#   namespace: pharos-frontend
# type: Opaque
# data:
#   cluster-ca.crt: <base64-encoded PEM>

---
# ── Sensitive credentials ─────────────────────────────────────────────────────
# Fill in REPLACE_ME values before applying.
# Use Sealed Secrets, Vault, or an OCP ExternalSecret for production.
apiVersion: v1
kind: Secret
metadata:
  name: pharos-frontend-secrets
  namespace: pharos-frontend
type: Opaque
stringData:
  OCP_CLIENT_SECRET: "REPLACE_ME"
  APP_SECRET_KEY: "REPLACE_ME"  # python3 -c "import secrets; print(secrets.token_urlsafe(64))"

---
# ── pharos-frontend (Streamlit UI) ────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharos-frontend
  namespace: pharos-frontend
  labels:
    app.kubernetes.io/name: pharos-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pharos-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pharos-frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: your-registry.example.com/pharos-frontend:latest
          command:
            - streamlit
            - run
            - app.py
            - "--server.port=8501"
            - "--server.address=0.0.0.0"
            - "--server.headless=true"
            - "--server.enableCORS=false"
            - "--server.enableXsrfProtection=true"
          ports:
            - containerPort: 8501
              name: http
          envFrom:
            - configMapRef:
                name: pharos-frontend-config
            - secretRef:
                name: pharos-frontend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 30
          # Uncomment to mount the cluster CA bundle (requires pharos-frontend-ca Secret):
          # volumeMounts:
          #   - name: cluster-ca
          #     mountPath: /etc/netpol-certs
          #     readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Streamlit writes temp files
            capabilities:
              drop: ["ALL"]
      # Uncomment when using a custom cluster CA:
      # volumes:
      #   - name: cluster-ca
      #     secret:
      #       secretName: pharos-frontend-ca

---
apiVersion: v1
kind: Service
metadata:
  name: pharos-frontend
  namespace: pharos-frontend
spec:
  selector:
    app.kubernetes.io/name: pharos-frontend
  ports:
    - port: 8501
      targetPort: 8501
      name: http

---
# OpenShift Route — TLS edge termination
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: pharos-frontend
  namespace: pharos-frontend
  annotations:
    haproxy.router.openshift.io/timeout: 120s
spec:
  host: pharos-frontend.apps.your-cluster.example.com  # replace
  to:
    kind: Service
    name: pharos-frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

---
# ── pharos-exporter (FastAPI) ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pharos-exporter
  namespace: pharos-frontend
  labels:
    app.kubernetes.io/name: pharos-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pharos-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pharos-exporter
    spec:
      serviceAccountName: pharos-exporter
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: exporter
          image: your-registry.example.com/pharos-exporter:latest
          command:
            - uvicorn
            - exporter.main:app
            - "--host=0.0.0.0"
            - "--port=8080"
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: pharos-frontend-config
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: cache
              mountPath: /app/cache
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: cache
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: pharos-exporter
  namespace: pharos-frontend
spec:
  selector:
    app.kubernetes.io/name: pharos-exporter
  ports:
    - port: 8080
      targetPort: 8080
      name: http
