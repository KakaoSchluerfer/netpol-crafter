---
apiVersion: v1
kind: Namespace
metadata:
  name: netpol-crafter
  labels:
    kubernetes.io/metadata.name: netpol-crafter

---
apiVersion: v1
kind: Secret
metadata:
  name: netpol-crafter-env
  namespace: netpol-crafter
type: Opaque
stringData:
  # Fill in before applying.  Use Sealed Secrets or Vault for production.
  OIDC_CLIENT_ID: "REPLACE_ME"
  OIDC_CLIENT_SECRET: "REPLACE_ME"
  AZURE_TENANT_ID: "REPLACE_ME"
  APP_SECRET_KEY: "REPLACE_ME"
  OIDC_REDIRECT_URI: "https://netpol-crafter.apps.your-cluster.example.com"
  # GitHub – use App auth in production
  GITHUB_REPO: "your-org/network-policies"
  GITHUB_BASE_BRANCH: "main"
  GITHUB_POLICIES_PATH: "policies"
  GITHUB_APP_ID: "REPLACE_ME"
  GITHUB_APP_INSTALLATION_ID: "REPLACE_ME"
  # Mount the PEM as a separate Secret volume and set GITHUB_APP_PRIVATE_KEY_PATH instead

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netpol-crafter
  namespace: netpol-crafter
  labels:
    app.kubernetes.io/name: netpol-crafter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netpol-crafter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netpol-crafter
    spec:
      serviceAccountName: netpol-crafter
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: app
          image: ghcr.io/your-org/netpol-crafter:latest  # replace with your registry
          ports:
            - containerPort: 8501
              name: http
          command: ["streamlit", "run", "app.py",
                    "--server.port=8501",
                    "--server.address=0.0.0.0",
                    "--server.headless=true",
                    "--server.enableCORS=false",
                    "--server.enableXsrfProtection=true"]
          envFrom:
            - secretRef:
                name: netpol-crafter-env
          env:
            - name: K8S_IN_CLUSTER
              value: "true"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /_stcore/health
              port: 8501
            initialDelaySeconds: 20
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Streamlit writes temp files
            capabilities:
              drop: ["ALL"]

---
apiVersion: v1
kind: Service
metadata:
  name: netpol-crafter
  namespace: netpol-crafter
spec:
  selector:
    app.kubernetes.io/name: netpol-crafter
  ports:
    - port: 8501
      targetPort: 8501
      name: http

---
# OpenShift Route (TLS edge termination)
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: netpol-crafter
  namespace: netpol-crafter
spec:
  host: netpol-crafter.apps.your-cluster.example.com  # replace
  to:
    kind: Service
    name: netpol-crafter
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
